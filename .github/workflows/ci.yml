name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

  build:
    name: Build ${{ matrix.platform }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            source: target/x86_64-unknown-linux-musl/release/dot
            executable: dot
          - platform: macos-aarch64
            runner: macos-15
            target: aarch64-apple-darwin
            source: target/aarch64-apple-darwin/release/dot
            executable: dot
          - platform: windows-x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            source: target/x86_64-pc-windows-msvc/release/dot.exe
            executable: dot.exe
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.target }}

      - name: Run target tests
        run: cargo test --locked --all-targets --all-features --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp '${{ matrix.source }}' 'dist/${{ matrix.executable }}'
          chmod +x 'dist/${{ matrix.executable }}'

      - name: Stage Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item '${{ matrix.source }}' 'dist/${{ matrix.executable }}'

      - name: Verify Linux binary is static
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          file dist/dot
          if readelf -l dist/dot | grep -q INTERP; then
            echo 'Linux binary contains a dynamic interpreter' >&2
            exit 1
          fi

      - name: Smoke test
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/dot --version

      - name: Smoke test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./dist/dot.exe --version

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: dot-${{ matrix.platform }}
          path: dist/${{ matrix.executable }}
          if-no-files-found: error

  publish:
    name: Publish rolling release
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: rolling
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: dot-*
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release
          install -m 755 artifacts/dot-linux-x86_64/dot release/dot-linux-x86_64
          install -m 755 artifacts/dot-macos-aarch64/dot release/dot-macos-aarch64
          install -m 644 artifacts/dot-windows-x86_64/dot.exe release/dot-windows-x86_64.exe

      - name: Create or update rolling release
        shell: bash
        run: |
          notes="Automated binaries built from main commit ${GITHUB_SHA}. Download the asset for the target platform and save it as dot (dot.exe on Windows)."

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh api --method PATCH \
              "/repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              --field sha="${GITHUB_SHA}" \
              --field force=true
            gh release upload "${RELEASE_TAG}" release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Latest development build" \
              --notes "${notes}" \
              --latest
          else
            gh release create "${RELEASE_TAG}" release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "Latest development build" \
              --notes "${notes}" \
              --latest
          fi
