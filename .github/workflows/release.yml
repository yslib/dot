name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - name: Validate tag version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(
            cargo metadata --locked --no-deps --format-version 1 |
              python3 -c 'import json, sys; data = json.load(sys.stdin); print(next(package["version"] for package in data["packages"] if package["name"] == "dot"))'
          )"

          if [[ "${tag_version}" != "${package_version}" ]]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo package version ${package_version}" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

  build:
    name: Build ${{ matrix.platform }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            source: target/x86_64-unknown-linux-musl/release/dot
            executable: dot
          - platform: macos-aarch64
            runner: macos-15
            target: aarch64-apple-darwin
            source: target/aarch64-apple-darwin/release/dot
            executable: dot
          - platform: windows-x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            source: target/x86_64-pc-windows-msvc/release/dot.exe
            executable: dot.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.target }}

      - name: Run target tests
        run: cargo test --locked --all-targets --all-features --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp '${{ matrix.source }}' 'dist/${{ matrix.executable }}'
          chmod +x 'dist/${{ matrix.executable }}'

      - name: Stage Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item '${{ matrix.source }}' 'dist/${{ matrix.executable }}'

      - name: Verify Linux binary is static
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          file dist/dot
          if readelf -l dist/dot | grep -q INTERP; then
            echo 'Linux binary contains a dynamic interpreter' >&2
            exit 1
          fi

      - name: Smoke test
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/dot --version

      - name: Smoke test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./dist/dot.exe --version

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: dot-${{ matrix.platform }}
          path: dist/${{ matrix.executable }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          pattern: dot-*
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release
          install -m 755 artifacts/dot-linux-x86_64/dot release/dot-linux-x86_64
          install -m 755 artifacts/dot-macos-aarch64/dot release/dot-macos-aarch64
          install -m 644 artifacts/dot-windows-x86_64/dot.exe release/dot-windows-x86_64.exe
          (cd release && sha256sum dot-* > SHA256SUMS)

      - name: Create GitHub Release
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --generate-notes \
              --title "${RELEASE_TAG}" \
              --latest
          fi
